# ========================================
# OpenClash 配置文件 - 本地软路由版
# ========================================
# 最后更新: 2026-06-17
# 设计原则:
#   1. 除了 AI 服务单独策略组，其他所有分组默认都走「通用选择」
#   2. 相同服务商必须在同一规则内，避免 IP 漂移
#   3. AI 服务完全独立，不经过链式开关，IP 稳定不漂移
#   4. 你只需要填机场订阅链接，节点自动拉取

# ========================================
# 端口配置
# ========================================
mixed-port: 7890
allow-lan: true
bind-address: '*'
mode: rule
log-level: info
ipv6: true

# ========================================
# DNS 配置
# ========================================
dns:
  enable: true
  ipv6: true
  listen: 0.0.0.0:53
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  enhanced-mode: redir-host
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN

# ========================================
# 🔑 你只需要改这里！填机场订阅和住宅IP节点信息
# ========================================
proxies:
  # 住宅IP节点（链式代理用，手动配置，不是订阅）
  - name: 住宅节点
    type: ss
    server: "你的住宅IP地址"  # ✅ 改成你的住宅IP
    port: 12345                  # ✅ 改成端口
    cipher: aes-256-gcm
    password: "你的密码"          # ✅ 改成密码

proxy-providers:
  # 你的主要机场节点
  机场订阅:
    type: http
    url: "https://你的机场订阅链接"  # ✅ 改成你的实际订阅链接
    interval: 3600  # 每小时自动更新
    health-check:
      enable: true
      interval: 300
      url: http://www.gstatic.com/generate_204

# ========================================
# 策略组配置
# ========================================
proxy-groups:
  # ----------------------------------------------------
  # 链式开关（全局控制是否走住宅IP多跳）
  # ----------------------------------------------------
  - name: 链式开关
    type: select
    proxies:
      - 关闭        # 默认：不走链式
      - 住宅节点    # 走住宅IP（手动配置的节点）

  # ----------------------------------------------------
  # 关闭 = 直接走普通节点，不经过链式
  # ----------------------------------------------------
  - name: 关闭
    type: select
    proxies:
      - 所有-自动

  # ----------------------------------------------------
  # 通用选择（大部分服务走这里，你的主要出口）
  # ----------------------------------------------------
  - name: 通用选择
    type: select
    proxies:
      - 链式开关    # 第一个选项是链式开关，默认走「关闭」
      - 所有-自动
      - 新加坡-自动
      - 香港-自动
      - 日本-自动
      - 美国-自动
      - 所有-手动
      - 直连
      - 拒绝

  # ----------------------------------------------------
  # AI 服务（完全独立，不经过链式开关，IP 稳定不漂移）
  # ----------------------------------------------------
  - name: AI 服务
    type: select
    proxies:
      - 新加坡-自动  # AI 服务固定走新加坡，不经过链式，IP 稳定
      - 所有-自动
      - 直连
      - 拒绝

  # ----------------------------------------------------
  # 开发服务（默认走通用选择，可单独切换）
  # ----------------------------------------------------
  - name: 开发服务
    type: select
    proxies:
      - 通用选择
      - 所有-自动
      - 直连
      - 拒绝

  # ----------------------------------------------------
  # 流媒体（默认走通用选择，可单独切换）
  # ----------------------------------------------------
  - name: 流媒体
    type: select
    proxies:
      - 通用选择
      - 所有-自动
      - 直连
      - 拒绝

  # ----------------------------------------------------
  # 游戏（默认走通用选择，可单独切换）
  # ----------------------------------------------------
  - name: 游戏
    type: select
    proxies:
      - 通用选择
      - 所有-自动
      - 直连
      - 拒绝

  # ----------------------------------------------------
  # 金融（默认走通用选择，可单独切换）
  # ----------------------------------------------------
  - name: 金融
    type: select
    proxies:
      - 通用选择
      - 所有-自动
      - 直连
      - 拒绝

  # ----------------------------------------------------
  # 测试（默认走通用选择，可单独切换）
  # ----------------------------------------------------
  - name: 测试
    type: select
    proxies:
      - 通用选择
      - 所有-自动
      - 直连
      - 拒绝

  # ----------------------------------------------------
  # 按地区自动选（从订阅里过滤节点名）
  # ----------------------------------------------------
  - name: 所有-自动
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    use:
      - 机场订阅  # 从订阅里自动选所有节点

  - name: 新加坡-自动
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    filter: "(?i)sg|新加坡|singapore"  # 过滤名字里带新加坡的节点
    use:
      - 机场订阅

  - name: 香港-自动
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    filter: "(?i)hk|香港|hongkong"  # 过滤名字里带香港的节点
    use:
      - 机场订阅

  - name: 日本-自动
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    filter: "(?i)jp|日本|japan"  # 过滤名字里带日本的节点
    use:
      - 机场订阅

  - name: 美国-自动
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    filter: "(?i)us|美国|america|united states"  # 过滤名字里带美国的节点
    use:
      - 机场订阅

  - name: 所有-手动
    type: select
    use:
      - 机场订阅  # 手动选择任意节点

  # ----------------------------------------------------
  # 内置特殊策略组
  # ----------------------------------------------------
  - name: 直连
    type: select
    proxies:
      - DIRECT

  - name: 拒绝
    type: select
    proxies:
      - REJECT

# ========================================
# Rule Providers（通用规则，社区自动维护）
# ========================================
rule-providers:
  # 广告拦截
  BanAD:
    behavior: classical
    type: http
    url: "https://raw.gitmirror.com/ACL4SSR/ACL4SSR/master/Clash/Providers/BanAD.yaml"
    interval: 86400
    path: ./ACL4SSR/BanAD.yaml

  # 程序广告拦截
  BanProgramAD:
    behavior: classical
    type: http
    url: "https://raw.gitmirror.com/ACL4SSR/ACL4SSR/master/Clash/Providers/BanProgramAD.yaml"
    interval: 86400
    path: ./ACL4SSR/BanProgramAD.yaml

  # 局域网
  LocalAreaNetwork:
    behavior: classical
    type: http
    url: "https://raw.gitmirror.com/ACL4SSR/ACL4SSR/master/Clash/Providers/LocalAreaNetwork.yaml"
    interval: 86400
    path: ./ACL4SSR/LocalAreaNetwork.yaml

  # Google 服务
  Google:
    behavior: classical
    type: http
    url: "https://raw.gitmirror.com/ACL4SSR/ACL4SSR/master/Clash/Providers/Ruleset/Google.yaml"
    interval: 86400
    path: ./ACL4SSR/Google.yaml

  # OpenAI / AI 服务
  OpenAI:
    behavior: classical
    type: http
    url: "https://raw.gitmirror.com/ACL4SSR/ACL4SSR/master/Clash/Providers/Ruleset/OpenAI.yaml"
    interval: 86400
    path: ./ACL4SSR/OpenAI.yaml

  # 流媒体 - Netflix
  Netflix:
    behavior: classical
    type: http
    url: "https://raw.gitmirror.com/ACL4SSR/ACL4SSR/master/Clash/Providers/Ruleset/Netflix.yaml"
    interval: 86400
    path: ./ACL4SSR/Netflix.yaml

  # 流媒体 - Disney+
  Disney:
    behavior: classical
    type: http
    url: "https://raw.gitmirror.com/ACL4SSR/ACL4SSR/master/Clash/Providers/Ruleset/Disney.yaml"
    interval: 86400
    path: ./ACL4SSR/Disney.yaml

  # 流媒体 - Spotify
  Spotify:
    behavior: classical
    type: http
    url: "https://raw.gitmirror.com/ACL4SSR/ACL4SSR/master/Clash/Providers/Ruleset/Spotify.yaml"
    interval: 86400
    path: ./ACL4SSR/Spotify.yaml

  # Steam / 游戏
  Steam:
    behavior: classical
    type: http
    url: "https://raw.gitmirror.com/ACL4SSR/ACL4SSR/master/Clash/Providers/Ruleset/Steam.yaml"
    interval: 86400
    path: ./ACL4SSR/Steam.yaml

  # GitHub
  GitHub:
    behavior: classical
    type: http
    url: "https://raw.gitmirror.com/ACL4SSR/ACL4SSR/master/Clash/Providers/Ruleset/GitHub.yaml"
    interval: 86400
    path: ./ACL4SSR/GitHub.yaml

  # 国内域名
  ChinaDomain:
    behavior: classical
    type: http
    url: "https://raw.gitmirror.com/ACL4SSR/ACL4SSR/master/Clash/Providers/ChinaDomain.yaml"
    interval: 86400
    path: ./ACL4SSR/ChinaDomain.yaml

  # 国内公司IP
  ChinaCompanyIp:
    behavior: ipcidr
    type: http
    url: "https://raw.gitmirror.com/ACL4SSR/ACL4SSR/master/Clash/Providers/ChinaCompanyIp.yaml"
    interval: 86400
    path: ./ACL4SSR/ChinaCompanyIp.yaml

# ========================================
# 规则列表
# 注意：按优先级从高到低排序！
# ========================================
rules:
  # ====================================================
  # 第一部分：你自用维护的特殊规则（一共就几条，一年不变几次）
  # ====================================================

  # 私有网络强制直连（最高优先级）
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,fc00::/7,DIRECT,no-resolve
  - IP-CIDR,fe80::/10,DIRECT,no-resolve
  - IP-CIDR,::1/128,DIRECT,no-resolve

  # 个人域名直连
  - DOMAIN,easonlao.ip-ddns.com,DIRECT

  # m-team PT 站直连
  - DOMAIN-KEYWORD,m-team,DIRECT
  - DOMAIN-SUFFIX,m-team.cc,DIRECT
  - DOMAIN-SUFFIX,m-team.io,DIRECT
  - DOMAIN-SUFFIX,manfuz.co,DIRECT
  - DOMAIN,tracker.m-team.cc,DIRECT
  - DOMAIN,tracker.m-team.io,DIRECT
  - DOMAIN,tra1.m-team.cc,DIRECT
  - DOMAIN,tra1.m-team.io,DIRECT
  - DOMAIN,tra99.manfuz.co,DIRECT

  # ====================================================
  # 第二部分：社区维护的通用规则（完全不用管，自动更新）
  # ====================================================

  # 局域网规则
  - RULE-SET,LocalAreaNetwork,DIRECT

  # 广告拦截（放在业务规则之前，避免广告走代理浪费流量）
  - RULE-SET,BanAD,REJECT
  - RULE-SET,BanProgramAD,REJECT

  # AI 服务（高优先级，单独策略组，IP 稳定不漂移）
  - RULE-SET,OpenAI,AI 服务
  - DOMAIN-SUFFIX,anthropic.com,AI 服务
  - DOMAIN-SUFFIX,gemini.google.com,AI 服务

  # 开发服务
  - RULE-SET,Google,开发服务
  - RULE-SET,GitHub,开发服务

  # 流媒体
  - RULE-SET,Netflix,流媒体
  - RULE-SET,Disney,流媒体
  - RULE-SET,Spotify,流媒体

  # 游戏
  - RULE-SET,Steam,游戏

  # 国内直连
  - RULE-SET,ChinaDomain,DIRECT
  - RULE-SET,ChinaCompanyIp,DIRECT
  - GEOIP,CN,DIRECT

  # ====================================================
  # 第三部分：最终兜底
  # ====================================================
  - MATCH,通用选择
