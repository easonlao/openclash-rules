# =========================================================
# OpenClash 自用配置
# 基于 Hans 链式代理模板，精简适配单住宅IP场景
# 适用：OpenClash（Mihomo 内核）/ iStoreOS 软路由
# =========================================================

# ──────────────── 基础设置 ────────────────
mixed-port: 7890
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: true
external-controller: :9090

proxy-providers:
  聚合机场:
    url: "https://你的机场订阅链接"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 180
    proxy: 直连

proxies:
  - name: 住宅-socks5
    type: socks5
    server: "你的住宅IP地址"
    port: 12345
    username: "你的用户名"
    password: "你的密码"
    udp: true
    skip-cert-verify: true
    dialer-proxy: 住宅中继组
  - { name: 直连, type: direct }
  - { name: 拒绝, type: reject }

# ========================
# 策略组定义
# ========================
default: &default
  type: select
  proxies:
    - 通用选择
    - 美国
    - 新加坡
    - 台湾
    - 日本
    - 香港
    - 全部
    - 住宅-socks5
    - 直连
    - 拒绝

proxy-groups:
  # ======= 机场底层组（按地区归类） =======
  - name: 香港
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 180
    tolerance: 60
    filter: (?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong)).*$
    use:
      - 聚合机场

  - name: 台湾
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 180
    tolerance: 60
    filter: (?=.*(广台|台湾|台灣|TW|Tai Wan|🇹🇼|TaiWan|Taiwan)).*$
    use:
      - 聚合机场

  - name: 日本
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 180
    tolerance: 120
    filter: (?=.*(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan)).*$
    use:
      - 聚合机场

  - name: 新加坡
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 180
    tolerance: 80
    filter: (?=.*(广新|新加坡|SG|坡|狮城|🇸🇬|Singapore)).*$
    use:
      - 聚合机场

  - name: 美国
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 180
    tolerance: 250
    filter: (?=.*(广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States)).*$
    use:
      - 聚合机场

  - name: 全部
    type: select
    use:
      - 聚合机场

  # ======= 总开关（面板第一个，日常只操作这一个，所有地区组已定义完成） =======
  - name: 通用选择
    type: select
    proxies:
      - 新加坡
      - 香港
      - 台湾
      - 日本
      - 美国
      - 全部
      - 住宅-socks5
      - 直连

  # ======= 住宅链路（后台辅助，不需要手动操作） =======
  - name: 住宅中继组
    type: select
    proxies:
      - 台湾
      - 日本
      - 新加坡
      - 香港
      - 美国
      - 全部

  # ======= 业务分流组（按模板语义保留） =======
  - { name: 人工智能, <<: *default }
  - { name: 流媒体, <<: *default }
  - { name: 谷歌, <<: *default }
  - { name: 微软, <<: *default }
  - { name: 苹果, <<: *default }
  - { name: 英伟达, <<: *default }
  - { name: 游戏, <<: *default }
  - { name: 加密货币, <<: *default }
  - { name: 颜色, <<: *default }
  - { name: 测试, <<: *default }
  - { name: 国外, <<: *default }
  - { name: 国内, <<: *default }
  - { name: 其他, <<: *default }

rule-anchor:
  ip: &ip { type: http, interval: 86400, behavior: ipcidr, format: mrs }
  domain: &domain { type: http, interval: 86400, behavior: domain, format: mrs }
  class:
    &class { type: http, interval: 86400, behavior: classical, format: text }

