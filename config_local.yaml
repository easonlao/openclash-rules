# =========================================================
# OpenClash 自用配置
# 基于 Hans 链式代理模板，精简适配单住宅IP场景
# 适用：OpenClash（Mihomo 内核）/ iStoreOS 软路由
# =========================================================

# ──────────────── 基础设置 ────────────────
mixed-port: 7890
allow-lan: true
bind-address: '*'
mode: rule
log-level: info
ipv6: true

# ──────────────── DNS ────────────────
dns:
  enable: true
  ipv6: true
  listen: 0.0.0.0:53
  default-nameserver:
  - 223.5.5.5
  - 119.29.29.29
  enhanced-mode: redir-host
  nameserver:
  - https://dns.alidns.com/dns-query
  - https://doh.pub/dns-query
  fallback:
  - https://1.1.1.1/dns-query
  - https://8.8.8.8/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN

proxy-providers:

  聚合机场:
    url: "http://10.10.10.20:13001/sKzPMDnq61b616yMU4M4/download/collection/jh"  
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 180
    proxy: 直连



proxies:
  - name: 住宅-socks5
    type: socks5
    server: 154.44.87.101
    port: 9004
    username: cpgp1vg4
    password: AioxAY0oDQPC
    udp: true
    skip-cert-verify: true
    dialer-proxy: 住宅中继组
  - {name: 直连, type: direct}
  - {name: 拒绝, type: reject}

# ========================
# 策略组定义
# ========================


proxy-groups:

# ======= 总开关（面板第一个，日常只操作这一个） =======
- name: 通用选择
  type: select
  proxies:
  - 新加坡-故转        # 默认，机场新加坡
  - 新加坡-手动
  - 新加坡-自动
  - 香港-故转
  - 香港-手动
  - 香港-自动
  - 台湾-故转
  - 台湾-手动
  - 台湾-自动
  - 日本-故转
  - 日本-手动
  - 日本-自动
  - 美国-故转
  - 美国-手动
  - 美国-自动
  - 其他-故转
  - 其他-手动
  - 其他-自动
  - 所有-故转          # 机场全局fallback
  - 所有-手动
  - 所有-自动          # 机场全局自动测速
  - 住宅-socks5        # 住宅出口，经实测可用的地区自动组中继
  - 直连

# ======= 机场底层组（先定义，供后面引用） =======
- name: 所有-手动
  type: select
  use:
  - 聚合机场

- name: 所有-自动
  type: url-test
  url: http://www.gstatic.com/generate_204
  interval: 180
  tolerance: 50
  use:
  - 聚合机场

- name: 所有-故转
  type: fallback
  interval: 180
  lazy: false
  proxies:
  - 所有-手动
  - 所有-自动

