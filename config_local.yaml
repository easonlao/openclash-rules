# =========================================================
# OpenClash 自用配置
# 基于 Hans 链式代理模板，精简适配单住宅IP场景
# 适用：OpenClash（Mihomo 内核）/ iStoreOS 软路由
# =========================================================

# ──────────────── 基础设置 ────────────────
mixed-port: 7890
allow-lan: true
bind-address: '*'
mode: rule
log-level: info
ipv6: true

# ──────────────── DNS ────────────────
dns:
  enable: true
  ipv6: true
  listen: 0.0.0.0:53
  default-nameserver:
  - 223.5.5.5
  - 119.29.29.29
  enhanced-mode: redir-host
  nameserver:
  - https://dns.alidns.com/dns-query
  - https://doh.pub/dns-query
  fallback:
  - https://1.1.1.1/dns-query
  - https://8.8.8.8/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN

# ──────────────── 节点配置 ────────────────

# === 自建节点（住宅IP，socks5协议，dialer-proxy 走机场跳板） ===
proxies:
- name: 住宅-socks5
  type: socks5
  server: 154.44.87.101
  port: 9004
  username: cpgp1vg4
  password: AioxAY0oDQPC
  udp: true
  skip-cert-verify: true
  dialer-proxy: 住宅中继组          # 关键：连住宅先走机场出去，否则直连不通

- name: 直连
  type: direct
- name: 拒绝
  type: reject

# === 机场订阅 ===
proxy-providers:
  聚合机场:
    type: http
    url: https://你的机场订阅链接
    interval: 86400
    health-check:
      enable: true
      interval: 180
      url: http://www.gstatic.com/generate_204
    proxy: 直连

# ──────────────── 策略组 ────────────────

# 通用业务模板：默认跟随总开关，同时保留全量手动/自动和直连
default: &default
  type: select
  proxies:
  - 通用选择
  - 所有-故转
  - 所有-手动
  - 所有-自动
  - 直连

# AI / Google 模板：只比通用模板多一个住宅出口
ai-google-default: &ai-google-default
  type: select
  proxies:
  - 通用选择
  - 住宅-socks5
  - 所有-故转
  - 所有-手动
  - 所有-自动
  - 直连

proxy-groups:

# ======= 总开关（面板第一个，日常只操作这一个） =======
- name: 通用选择
  type: select
  proxies:
  - 新加坡-故转        # 默认，机场新加坡
  - 所有-故转          # 机场全局fallback
  - 香港-故转
  - 台湾-故转
  - 日本-故转
  - 美国-故转
  - 其他-故转
  - 所有-自动          # 机场全局自动测速
  - 香港-自动
  - 台湾-自动
  - 日本-自动
  - 新加坡-自动
  - 美国-自动
  - 其他-自动
  - 直连

# ======= 业务分流组（默认跟通用选择，可按需独立切换） =======
- name: 人工智能
  <<: *ai-google-default

- name: 流媒体
  <<: *default

- name: 谷歌
  <<: *ai-google-default

- name: 微软
  <<: *default

- name: 苹果
  <<: *default

- name: 英伟达
  <<: *default

- name: 游戏
  <<: *default

- name: 加密货币
  <<: *default

- name: 颜色
  <<: *default

- name: 测试
  <<: *default

- name: 国外
  <<: *default

- name: 国内
  type: select
  proxies:
  - 直连
  - 通用选择
  - 所有-故转
  - 所有-手动
  - 所有-自动

- name: 其他
  <<: *default

# ======= 住宅链路（后台辅助，不需要手动操作） =======
# 住宅-故转：住宅IP优先，挂了fallback到机场
- name: 住宅-故转
  type: fallback
  interval: 180
  lazy: false
  proxies:
  - 住宅-socks5
  - 所有-故转

# 住宅中继组：选哪个机场节点作为跳板去连住宅IP
- name: 住宅中继组
  type: select
  proxies:
  - 所有-自动
  - 香港-自动
  - 台湾-自动
  - 日本-自动
  - 新加坡-自动
  - 美国-自动
  - 其他-自动

# ======= 机场底层组（后台辅助，不需要手动操作） =======
- name: 所有-手动
  type: select
  use:
  - 聚合机场

- name: 所有-自动
  type: url-test
  url: http://www.gstatic.com/generate_204
  interval: 180
  tolerance: 50
  use:
  - 聚合机场

- name: 所有-故转
  type: fallback
  interval: 180
  lazy: false
  proxies:
  - 所有-手动
  - 所有-自动

# ======= 地区分组（后台辅助，不需要手动操作） =======
- name: 香港-手动
  type: select
  filter: (?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong)).*$
  use:
  - 聚合机场

- name: 香港-自动
  type: url-test
  url: http://www.gstatic.com/generate_204
  interval: 180
  tolerance: 50
  filter: (?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong)).*$
  use:
  - 聚合机场

- name: 香港-故转
