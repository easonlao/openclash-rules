# =========================================================
# OpenClash 自用配置（手机极简基线）
# 适用：ClashMi / Clash Meta
# 运行态（DNS / TUN / IPv6 / 端口）交给 ClashMi 设置页
# =========================================================

proxy-providers:
  聚合机场:
    url: "https://你的机场订阅链接"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 180
    proxy: 直连

proxies:
  - name: 回家
    type: ss
    server: socks.l-home.top
    port: 12320
    cipher: aes-256-gcm
    password: "你的SS密码"
    udp: true
    dialer-proxy: 直连
    ip-version: ipv6
  - name: 住宅-socks5
    type: socks5
    server: "你的住宅IP地址"
    port: 12345
    username: "你的用户名"
    password: "你的密码"
    udp: true
    skip-cert-verify: true
    dialer-proxy: 住宅中继组
  - { name: 直连, type: direct }
  - { name: 拒绝, type: reject }

default: &default
  type: select
  proxies:
    - 通用选择
    - 新加坡
    - 香港
    - 台湾
    - 日本
    - 美国
    - 全部
    - 住宅-socks5
    - 直连
    - 拒绝

proxy-groups:
  - name: 香港
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 180
    tolerance: 60
    filter: (?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong)).*$
    use:
      - 聚合机场

  - name: 台湾
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 180
    tolerance: 60
    filter: (?=.*(广台|台湾|台灣|TW|Tai Wan|🇹🇼|TaiWan|Taiwan)).*$
    use:
      - 聚合机场

  - name: 日本
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 180
    tolerance: 120
    filter: (?=.*(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan)).*$
    use:
      - 聚合机场

  - name: 新加坡
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 180
    tolerance: 80
    filter: (?=.*(广新|新加坡|SG|坡|狮城|🇸🇬|Singapore)).*$
    use:
      - 聚合机场

  - name: 美国
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 180
    tolerance: 250
    filter: (?=.*(广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States)).*$
    use:
      - 聚合机场

  - name: 全部
    type: select
    use:
      - 聚合机场

  - name: 通用选择
    type: select
    proxies:
      - 回家
      - 新加坡
      - 香港
      - 台湾
      - 日本
      - 美国
      - 全部
      - 住宅-socks5
      - 直连

  - name: 住宅中继组
    type: select
    proxies:
      - 台湾
      - 日本
      - 新加坡
      - 香港
      - 美国
      - 全部

  - { name: 人工智能, <<: *default }
  - { name: 国外, <<: *default }
  - { name: 国内, <<: *default }
  - { name: 其他, <<: *default }

rule-anchor:
  ip: &ip { type: http, interval: 86400, behavior: ipcidr, format: mrs }
  domain: &domain { type: http, interval: 86400, behavior: domain, format: mrs }
  class:
    &class { type: http, interval: 86400, behavior: classical, format: text }

rules:
  - RULE-SET,AD-RULE / Domain,拒绝
  - RULE-SET,ChatGPT / Domain,人工智能
  - RULE-SET,Claude / Domain,人工智能
  - RULE-SET,Copilot / Domain,人工智能
  - RULE-SET,Gemini / Domain,人工智能
  - RULE-SET,Groq / Domain,人工智能
  - RULE-SET,Grok / Domain,人工智能
  - RULE-SET,Meta AI / Domain,人工智能
  - RULE-SET,Perplexity / Domain,人工智能
  - RULE-SET,Google / IP,国外,no-resolve
  - RULE-SET,Netflix / IP,国外,no-resolve
  - RULE-SET,Telegram / IP,国外,no-resolve
  - RULE-SET,Proxy / Domain,国外
  - RULE-SET,Globe / Domain,国外
  - RULE-SET,Direct / Domain,国内
  - RULE-SET,China / Domain,国内
  - RULE-SET,China / IP,国内,no-resolve
  - RULE-SET,Private / Domain,国内
  - MATCH,其他

