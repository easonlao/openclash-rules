  - 所有-故转
  - 直连
  - 拒绝

# ======= 机场底层组（后台辅助，不需要手动操作） =======
- name: 所有-手动
  type: select
  use:
  - 聚合机场

- name: 所有-自动
  type: url-test
  url: http://www.gstatic.com/generate_204
  interval: 180
  tolerance: 50
  use:
  - 聚合机场

- name: 所有-故转
  type: fallback
  interval: 180
  lazy: false
  proxies:
  - 所有-手动
  - 所有-自动

