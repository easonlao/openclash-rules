# ========================================
# OpenClash 配置文件 - 手机统一版（Clash Mi 用）
# ========================================
# 最后更新: 2026-06-18
# 包含: 回家代理 + *.l-home.top 直连规则
# 核心设计:
#   1. 🏆 通用选择是全局总开关，改一次所有业务组都跟着变
#   2. 住宅IP手动配置，不是订阅链接
#   3. 故转用 fallback 模式，节点挂了才自动切，平时不跳 IP
#   4. 自动测速仅作备选，不设为默认
#   5. 某个服务需要单独节点时，才去那个组里单独改

# ========================================
# 端口配置
# ========================================
mixed-port: 7890
allow-lan: false
bind-address: 127.0.0.1
mode: rule
log-level: info
ipv6: true

# ========================================
# DNS 配置
# ========================================
dns:
  enable: true
  ipv6: true
  # 用国内 DNS 解析代理节点域名，避免鸡蛋问题
  proxy-server-nameserver:
    - https://doh.pub/dns-query
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN

# ========================================
# 🔑 你只需要改这里！填机场订阅、住宅IP、回家代理密码
# ========================================
proxies:
  # 回家代理（固定，不用改，只要填密码）
  - name: Home
    type: ss
    server: socks.l-home.top
    port: 12320
    cipher: aes-256-gcm
    password: "你的SS密码"  # ✅ 改成你的实际密码

  # 住宅IP节点（链式代理用，手动配置，不是订阅）
  - name: 住宅节点
    type: ss
    server: "你的住宅IP地址"  # ✅ 改成你的住宅IP
    port: 12345                  # ✅ 改成端口
    cipher: aes-256-gcm
    password: "你的密码"          # ✅ 改成密码

  - {name: 直连, type: direct}
  - {name: 拒绝, type: reject}

proxy-providers:
  # 你的主要机场节点
  聚合机场:
    type: http
    url: "https://你的机场订阅链接"  # ✅ 改成你的实际订阅链接
    interval: 86400
    health-check:
      enable: true
      interval: 180
      url: http://www.gstatic.com/generate_204
    proxy: 直连

# ========================================
# 策略组配置
# ========================================
proxy-groups:
  # ----------------------------------------------------
  # 回家开关（手机独有，一键切换是否走家里的代理）
  # ----------------------------------------------------
  - name: 回家开关
    type: select
    proxies:
      - 所有-故转   # 默认：直接连机场，不回家
      - Home        # 在家时手动切到这个，通过家里的代理翻墙

  # ----------------------------------------------------
  # 🏆 通用选择（全局总开关，改这个所有业务组都跟着变）
  # ----------------------------------------------------
  - name: 通用选择
    type: select
    proxies:
      - 链式开关
      - 所有-故转
      - 所有-手动
      - 香港-故转
      - 台湾-故转
      - 日本-故转
      - 新加坡-故转
      - 美国-故转
      - 其他-故转
      - 所有-自动
      - 香港-自动
      - 台湾-自动
      - 日本-自动
      - 新加坡-自动
      - 美国-自动
      - 其他-自动
      - 直连
      - 拒绝

  # ----------------------------------------------------
  # 链式开关（全局控制是否走住宅 IP 多跳）
  # ----------------------------------------------------
  - name: 链式开关
    type: select
    proxies:
      - 回家开关    # 默认：不走链式，走回家开关
      - 住宅节点    # 走住宅 IP

  # ====================================================
  # 业务分流组（默认都走通用选择，需要时再单独改）
  # ====================================================
  - name: 人工智能
    type: select
    proxies:
      - 通用选择      # 默认走通用
      - 所有-故转     # 下面这些是给你需要单独设置时用的
      - 新加坡-故转
      - 美国-故转
      - 所有-手动
      - 直连
      - 拒绝

  - name: 流媒体
    type: select
    proxies:
      - 通用选择
      - 所有-故转
      - 香港-故转
      - 台湾-故转
      - 日本-故转
      - 新加坡-故转
      - 美国-故转
      - 所有-手动
      - 直连
      - 拒绝

  - name: 谷歌
    type: select
    proxies:
      - 通用选择
      - 所有-故转
      - 所有-手动
      - 直连
      - 拒绝

  - name: 微软
    type: select
    proxies:
      - 通用选择
      - 所有-故转
      - 所有-手动
      - 直连
      - 拒绝

  - name: 苹果
    type: select
    proxies:
      - 通用选择
      - 所有-故转
      - 所有-手动
      - 直连
      - 拒绝

  - name: 英伟达
    type: select
    proxies:
      - 通用选择
      - 所有-故转
      - 所有-手动
      - 直连
      - 拒绝

  - name: 游戏
    type: select
    proxies:
      - 通用选择
      - 所有-故转
      - 所有-手动
      - 直连
      - 拒绝

  - name: 加密货币
    type: select
    proxies:
      - 通用选择
      - 所有-故转
      - 所有-手动
      - 直连
      - 拒绝

  - name: 颜色
    type: select
    proxies:
      - 通用选择
      - 所有-故转
      - 所有-手动
      - 直连
      - 拒绝

  - name: 测试
    type: select
    proxies:
      - 通用选择
      - 所有-故转
      - 所有-手动
      - 所有-自动
      - 直连
      - 拒绝

  - name: 国外
    type: select
    proxies:
      - 通用选择
      - 所有-故转
      - 所有-手动
      - 直连
      - 拒绝

  - name: 国内
    type: select
    proxies:
      - 通用选择
      - 直连
      - 拒绝

  - name: 其他
    type: select
    proxies:
      - 通用选择
      - 所有-故转
      - 所有-手动
      - 直连
      - 拒绝

  # ====================================================
  # 工具分组
  # ====================================================
  - name: 所有-手动
    type: select
    use:
      - 聚合机场

  - name: 所有-自动
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 180
    tolerance: 50
    use:
      - 聚合机场

  - name: 所有-故转
    type: fallback
    interval: 180
    lazy: false
    proxies:
      - 所有-手动
      - 所有-自动

  # ====================================================
  # 香港组
  # ====================================================
  - name: 香港-手动
    type: select
    filter: "(?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong)).*$"
    use:
      - 聚合机场

  - name: 香港-自动
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 180
    tolerance: 50
    filter: "(?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong)).*$"
    use:
      - 聚合机场

  - name: 香港-故转
    type: fallback
    interval: 180
    lazy: false
    proxies:
      - 香港-手动
      - 香港-自动

  # ====================================================
  # 台湾组
  # ====================================================
  - name: 台湾-手动
    type: select
    filter: "(?=.*(广台|台湾|台灣|TW|Tai Wan|🇹🇼|TaiWan|Taiwan)).*$"
    use:
      - 聚合机场

  - name: 台湾-自动
    type: url-test
