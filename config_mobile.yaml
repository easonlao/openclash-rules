    type: select
    filter: "(?=.*(广新|新加坡|SG|坡|狮城|🇸🇬|Singapore)).*$"
    use:
      - 聚合机场

  - name: 新加坡-自动
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 180
    tolerance: 50
    filter: "(?=.*(广新|新加坡|SG|坡|狮城|🇸🇬|Singapore)).*$"
    use:
      - 聚合机场

  - name: 新加坡-故转
    type: fallback
    interval: 180
    lazy: false
    proxies:
      - 新加坡-手动
      - 新加坡-自动

  # ====================================================
  # 美国组
  # ====================================================
  - name: 美国-手动
    type: select
    filter: "(?=.*(广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States)).*$"
    use:
      - 聚合机场

  - name: 美国-自动
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 180
    tolerance: 50
    filter: "(?=.*(广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States)).*$"
    use:
