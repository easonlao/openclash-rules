# =========================================================
# OpenClash 自用配置（手机版）
# 基于 Hans 链式代理模板，精简适配单住宅IP场景
# 适用：Clash Meta for Android
# 差异：多了回家开关、Home节点、*.l-home.top 直连规则
# =========================================================

# ──────────────── 基础设置 ────────────────
mixed-port: 7890
allow-lan: false
bind-address: 127.0.0.1
mode: rule
log-level: info
ipv6: true

# ──────────────── DNS ────────────────
dns:
  enable: true
  ipv6: true
  proxy-server-nameserver:
  - https://doh.pub/dns-query
  default-nameserver:
  - 223.5.5.5
  - 119.29.29.29
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
  - https://dns.alidns.com/dns-query
  - https://doh.pub/dns-query
  fallback:
  - https://1.1.1.1/dns-query
  - https://8.8.8.8/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN

# ──────────────── 节点配置 ────────────────

# === 自建节点 ===
proxies:
# 回家代理（iStoreOS PassWall Server，域名走 Cloudflare IPv6）
- name: Home
  type: ss
  server: socks.l-home.top
  port: 12320
  cipher: aes-256-gcm
  password: 你的SS密码           # <--- 【必改】填写真实密码

# 住宅IP（socks5协议，手机端不支持 dialer-proxy，住宅不可用）
- name: 住宅-socks5
  type: socks5
  server: 154.44.87.101
  port: 9004
  username: cpgp1vg4
  password: AioxAY0oDQPC
  # 注意：手机端 Clash Meta 可能不支持 dialer-proxy
  # 如需在手机上走住宅，需在软路由上做端口转发

- name: 直连
  type: direct
- name: 拒绝
  type: reject

# === 机场订阅 ===
proxy-providers:
  聚合机场:
    type: http
    url: https://你的机场订阅链接
    interval: 86400
    health-check:
      enable: true
      interval: 180
      url: http://www.gstatic.com/generate_204
    proxy: 直连

# ──────────────── 策略组 ────────────────

proxy-groups:

# ======= 回家开关（手机独有，切到 Home 走内网回家） =======
- name: 回家开关
  type: select
  proxies:
  - 所有-故转          # 默认，走机场
  - Home               # 回家，访问内网设备

# ======= 总开关（日常只操作这一个） =======
- name: 通用选择
  type: select
  proxies:
  - 回家开关          # 默认跟回家开关
  - 新加坡-故转
  - 所有-故转
  - 香港-故转
  - 台湾-故转
  - 日本-故转
  - 美国-故转
  - 其他-故转
  - 所有-自动
  - 香港-自动
  - 台湾-自动
  - 日本-自动
  - 新加坡-自动
  - 美国-自动
  - 其他-自动
  - 直连
  - 拒绝

# ======= 业务分流组（默认跟通用选择，可按需独立切换） =======
- name: 人工智能
  type: select
  proxies:
  - 新加坡-故转        # AI服务首选新加坡，IP稳定
  - 美国-故转
  - 回家开关
  - 所有-故转
  - 直连
  - 拒绝

- name: 流媒体
  type: select
  proxies:
  - 通用选择
  - 所有-故转
  - 香港-故转
  - 台湾-故转
  - 日本-故转
  - 新加坡-故转
  - 美国-故转
  - 直连
  - 拒绝

- name: 谷歌
  type: select
  proxies:
  - 通用选择
  - 所有-故转
  - 直连
  - 拒绝

- name: 微软
  type: select
  proxies:
  - 通用选择
  - 所有-故转
  - 直连
  - 拒绝

- name: 苹果
  type: select
