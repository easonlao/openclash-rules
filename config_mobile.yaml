# ========================================
# OpenClash 配置文件 - 手机统一版（Clash Mi 用）
# ========================================
# 最后更新: 2026-06-18
# 包含: 回家代理 + *.l-home.top 直连规则
# 设计原则:
#   1. 住宅IP手动配置，不是订阅链接
#   2. 故转用 fallback 模式，节点挂了才自动切，平时不跳 IP
#   3. 自动测速仅作备选，不设为默认
#   4. AI 服务完全独立，不经过链式开关和回家开关

# ========================================
# 端口配置
# ========================================
mixed-port: 7890
allow-lan: false
bind-address: 127.0.0.1
mode: rule
log-level: info
ipv6: true

# ========================================
# DNS 配置
# ========================================
dns:
  enable: true
  ipv6: true
  # 用国内 DNS 解析代理节点域名，避免鸡蛋问题
  proxy-server-nameserver:
    - https://doh.pub/dns-query
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN

# ========================================
# 🔑 你只需要改这里！填机场订阅、住宅IP、回家代理密码
# ========================================
proxies:
  # 回家代理（固定，不用改，只要填密码）
  - name: Home
    type: ss
    server: socks.l-home.top
    port: 12320
    cipher: aes-256-gcm
    password: "你的SS密码"  # ✅ 改成你的实际密码

  # 住宅IP节点（链式代理用，手动配置，不是订阅）
  - name: 住宅节点
    type: ss
    server: "你的住宅IP地址"  # ✅ 改成你的住宅IP
    port: 12345                  # ✅ 改成端口
    cipher: aes-256-gcm
    password: "你的密码"          # ✅ 改成密码

  - {name: 直连, type: direct}
  - {name: 拒绝, type: reject}

proxy-providers:
  # 你的主要机场节点
  聚合机场:
    type: http
    url: "https://你的机场订阅链接"  # ✅ 改成你的实际订阅链接
    interval: 86400
    health-check:
      enable: true
      interval: 180
      url: http://www.gstatic.com/generate_204
    proxy: 直连

# ========================================
# 策略组配置
# ========================================
default: &default
  type: select
  proxies:
    - 链式开关
    - 所有-故转
    - 所有-手动
    - 香港-故转
    - 香港-自动
    - 香港-手动
    - 台湾-故转
    - 台湾-自动
    - 台湾-手动
    - 日本-故转
    - 日本-自动
    - 日本-手动
    - 新加坡-故转
    - 新加坡-自动
    - 新加坡-手动
    - 美国-故转
    - 美国-自动
    - 美国-手动
    - 其他-故转
    - 其他-手动
    - 直连
    - 拒绝

proxy-groups:
  # ----------------------------------------------------
  # 回家开关（一键切换是否走家里的代理翻墙）
  # ----------------------------------------------------
  - name: 回家开关
    type: select
    proxies:
      - 所有-故转   # 默认：直接连机场，不回家
      - Home        # 在家时手动切到这个，通过家里的代理翻墙

  # ----------------------------------------------------
  # 链式开关（全局控制是否走住宅IP多跳）
  # ----------------------------------------------------
  - name: 链式开关
    type: select
    proxies:
      - 回家开关    # 默认：不走链式，走回家开关
      - 住宅节点    # 走住宅IP（手动配置的节点）

  # ====================================================
  # 业务分流组（按原始模板命名）
  # ====================================================
  - {name: 人工智能, <<: *default}
  - {name: 流媒体, <<: *default}
  - {name: 谷歌, <<: *default}
  - {name: 微软, <<: *default}
  - {name: 苹果, <<: *default}
  - {name: 英伟达, <<: *default}
  - {name: 游戏, <<: *default}
  - {name: 加密货币, <<: *default}
  - {name: 颜色, <<: *default}
  - {name: 测试, <<: *default}
  - {name: 国外, <<: *default}
  - {name: 国内, <<: *default}
  - {name: 其他, <<: *default}

  # ====================================================
  # 工具分组
  # ====================================================
  - name: 所有-手动
    type: select
    use:
      - 聚合机场

  - name: 所有-自动
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 180
    tolerance: 50
    use:
      - 聚合机场

  - name: 所有-故转
    type: fallback
    interval: 180
    lazy: false
    proxies:
      - 所有-手动
      - 所有-自动

  # ====================================================
  # 香港组
  # ====================================================
  - name: 香港-手动
    type: select
    filter: "(?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong)).*$"
    use:
      - 聚合机场

  - name: 香港-自动
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 180
    tolerance: 50
    filter: "(?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong)).*$"
    use:
      - 聚合机场

  - name: 香港-故转
    type: fallback
    interval: 180
    lazy: false
    proxies:
      - 香港-手动
      - 香港-自动

  # ====================================================
  # 台湾组
  # ====================================================
  - name: 台湾-手动
    type: select
    filter: "(?=.*(广台|台湾|台灣|TW|Tai Wan|🇹🇼|TaiWan|Taiwan)).*$"
    use:
      - 聚合机场

  - name: 台湾-自动
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 180
    tolerance: 50
    filter: "(?=.*(广台|台湾|台灣|TW|Tai Wan|🇹🇼|TaiWan|Taiwan)).*$"
    use:
      - 聚合机场

  - name: 台湾-故转
    type: fallback
    interval: 180
    lazy: false
    proxies:
      - 台湾-手动
      - 台湾-自动

  # ====================================================
  # 日本组
  # ====================================================
  - name: 日本-手动
    type: select
    filter: "(?=.*(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan)).*$"
    use:
      - 聚合机场

  - name: 日本-自动
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 180
    tolerance: 50
    filter: "(?=.*(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan)).*$"
    use:
      - 聚合机场

  - name: 日本-故转
    type: fallback
