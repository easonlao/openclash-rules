# =========================================================
# OpenClash 自用配置（手机版）
# 基于 Hans 链式代理模板，精简适配单住宅IP场景
# 适用：Clash Meta for Android
# 差异：多了回家开关、回家节点、*.l-home.top 直连规则
# =========================================================

# ──────────────── 基础设置 ────────────────
mixed-port: 7890
allow-lan: false
bind-address: 127.0.0.1
mode: rule
log-level: info
ipv6: true

# ──────────────── DNS ────────────────
dns:
  enable: true
  ipv6: true
  proxy-server-nameserver:
  - https://doh.pub/dns-query
  default-nameserver:
  - 223.5.5.5
  - 119.29.29.29
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
  - https://dns.alidns.com/dns-query
  - https://doh.pub/dns-query
  fallback:
  - https://1.1.1.1/dns-query
  - https://8.8.8.8/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN

# ──────────────── 节点配置 ────────────────

# === 自建节点 ===
proxies:
# 回家代理（iStoreOS PassWall Server，域名走 Cloudflare IPv6）
- name: 回家
  type: ss
  server: socks.l-home.top
  port: 12320
  cipher: aes-256-gcm
  password: "你的SS密码"           # iStoreOS PassWall Server

# 住宅IP（与家用配置一致，经住宅中继组连接）
- name: 住宅-socks5
  type: socks5
  server: "你的住宅IP地址"
  port: 12345
  username: "你的用户名"
  password: "你的密码"
  udp: true
  skip-cert-verify: true
  dialer-proxy: 住宅中继组

- name: 直连
  type: direct
- name: 拒绝
  type: reject

# === 机场订阅 ===
proxy-providers:
  聚合机场:
    type: http
    url: https://你的机场订阅链接
    interval: 86400
    health-check:
      enable: true
      interval: 180
      url: http://www.gstatic.com/generate_204
    proxy: 直连

# ──────────────── 策略组 ────────────────

# 通用业务模板：手机版比家用版多一层回家开关
default: &default
  type: select
  proxies:
  - 回家开关
  - 通用选择
  - 所有-故转
  - 所有-手动
  - 所有-自动
  - 直连

# AI / Google 模板：在通用模板基础上直接提供住宅出口
ai-google-default: &ai-google-default
  type: select
  proxies:
  - 回家开关
  - 通用选择
  - 住宅-socks5
  - 所有-故转
  - 所有-手动
  - 所有-自动
  - 直连

proxy-groups:

# ======= 业务分流组（日常操作，放在最前面） =======
- name: 回家开关
  type: select
  proxies:
  - 通用选择          # 默认，与家用配置一致
  - 回家              # 回家，访问内网设备

- name: 通用选择
  type: select
  proxies:
  - 新加坡-故转
  - 新加坡-手动
  - 新加坡-自动
  - 香港-故转
  - 香港-手动
  - 香港-自动
  - 台湾-故转
  - 台湾-手动
  - 台湾-自动
  - 日本-故转
  - 日本-手动
  - 日本-自动
  - 美国-故转
  - 美国-手动
  - 美国-自动
  - 其他-故转
  - 其他-手动
  - 其他-自动
  - 所有-故转
  - 所有-手动
  - 所有-自动
  - 住宅-socks5
  - 直连

- name: 人工智能
  <<: *ai-google-default

- name: 流媒体
  <<: *default

- name: 谷歌
  <<: *ai-google-default

- name: 微软
  <<: *default

- name: 苹果
  <<: *default

- name: 国外
  <<: *default

- name: 国内
  type: select
  proxies:
  - 直连
  - 回家开关
  - 通用选择
  - 所有-故转
  - 所有-手动
  - 所有-自动

- name: 其他
  <<: *default

# ======= 地区节点选择组（后台辅助，不常手动切换） =======
- name: 香港-手动
  type: select
  filter: (?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong)).*$
  use:
  - 聚合机场

- name: 香港-自动
  type: url-test
  url: http://www.gstatic.com/generate_204
  interval: 180
  tolerance: 50
  filter: (?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong)).*$
  use:
  - 聚合机场

- name: 香港-故转
  type: fallback
  interval: 180
  lazy: false
  proxies:
  - 香港-手动
  - 香港-自动

- name: 台湾-手动
