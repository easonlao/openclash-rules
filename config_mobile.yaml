# ========================================
# 规则列表
# ========================================
rules:
  # ====================================================
  # 第一部分：自用维护的特殊规则
  # ====================================================

  # 家里反代强制直连！避免回家代理回环
  - DOMAIN-SUFFIX,l-home.top,DIRECT

  # 私有网络强制直连
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve

  # 个人域名直连
  - DOMAIN,easonlao.ip-ddns.com,DIRECT

  # m-team PT站直连
  - DOMAIN-KEYWORD,m-team,DIRECT
  - DOMAIN-SUFFIX,m-team.cc,DIRECT
  - DOMAIN-SUFFIX,m-team.io,DIRECT
  - DOMAIN,tracker.m-team.cc,DIRECT

  # ====================================================
  # 第二部分：社区维护的通用规则
  # ====================================================

  # 广告拦截
  - RULE-SET,BanAD,REJECT
  - RULE-SET,BanProgramAD,REJECT

  # AI 服务
  - RULE-SET,ChatGPT,人工智能
  - RULE-SET,Claude,人工智能
  - RULE-SET,Groq,人工智能

  # 科技公司
  - RULE-SET,Google,谷歌
  - RULE-SET,Microsoft,微软
  - RULE-SET,Apple,苹果
  - RULE-SET,AppleCN,苹果
  - RULE-SET,Nvidia,英伟达

  # 加密货币
  - RULE-SET,Crypto,加密货币
  - RULE-SET,Binance,加密货币
  - RULE-SET,OKX,加密货币
  - RULE-SET,Bybit,加密货币

  # 流媒体
  - RULE-SET,TikTok,流媒体
  - RULE-SET,Netflix,流媒体
  - RULE-SET,Disney,流媒体
  - RULE-SET,HBO,流媒体
  - RULE-SET,Spotify,流媒体
  - RULE-SET,Crunchyroll,流媒体

  # 游戏
  - RULE-SET,Steam,游戏
  - RULE-SET,Epic,游戏
  - RULE-SET,EA,游戏
  - RULE-SET,Blizzard,游戏

  # 测试
  - RULE-SET,Test,测试

  # 颜色/成人内容
  - RULE-SET,Sex,颜色

  # 国外通用
  - RULE-SET,Proxy,国外
  - RULE-SET,Globe,国外

  # 国内直连
  - RULE-SET,Direct,国内
  - RULE-SET,China,国内
  - RULE-SET,ChinaIP,国内,no-resolve
  - RULE-SET,Private,国内

  # ====================================================
  # 第三部分：最终兜底
  # ====================================================
  - MATCH,其他
